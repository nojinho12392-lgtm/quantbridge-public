name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "24 20 * * 0"
  workflow_dispatch:

concurrency:
  group: quantbridge-codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Check code scanning availability
        id: code-scanning
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status="$(
            curl -sS -o /tmp/code-scanning.json -w "%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${{ github.api_url }}/repos/${{ github.repository }}/code-scanning/alerts?per_page=1" \
              || true
          )"
          if [[ "$status" == "200" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code scanning unavailable (HTTP $status); skipping CodeQL analysis."
          fi
      - name: Initialize CodeQL
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: python
      - name: Perform CodeQL Analysis
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v4
