services:
  postgres:
    image: postgres:16
    container_name: quantbridge-postgres
    environment:
      POSTGRES_DB: quantbridge
      POSTGRES_USER: quantbridge
      POSTGRES_PASSWORD: quantbridge
    ports:
      - "5432:5432"
    volumes:
      - quantbridge_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantbridge -d quantbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: quantbridge-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUANT_ENABLE_POSTGRES: "true"
      QUANT_DATABASE_URL: postgresql://quantbridge:quantbridge@postgres:5432/quantbridge
      QUANT_ENABLE_PARQUET: "false"
      QUANT_GOOGLE_KEY_PATH: /app/key.json
      QUANT_SPREADSHEET_ID: 1kn0Kp1QESSdwvmphCmaUFHNRh9qVUoN-2m_vMVDYHes
      QUANT_SPREADSHEET_NAME: Jino_Quant_Database
      QUANT_API_SQLITE_PATH: /var/lib/quantbridge/quantbridge.sqlite3
      QUANT_API_CACHE_DIR: /var/lib/quantbridge/api_runtime_cache
      QUANT_API_AUTO_WARM: ${QUANT_API_AUTO_WARM:-1}
      QUANT_API_ALLOW_EXTERNAL_FETCH: ${QUANT_API_ALLOW_EXTERNAL_FETCH:-true}
      QUANT_API_ENV: local
      QUANT_CORS_ORIGINS: "*"
      QUANT_AUTH_RATE_LIMIT_PER_MINUTE: "20"
    ports:
      - "8000:8000"
    volumes:
      - ./key.json:/app/key.json:ro
      - quantbridge_api:/var/lib/quantbridge
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()\""]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 20s

  research-quality:
    profiles: ["jobs"]
    build:
      context: .
      dockerfile: tools/Dockerfile.research
    container_name: quantbridge-research-quality
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUANT_ENABLE_POSTGRES: "true"
      QUANT_DATABASE_URL: postgresql://quantbridge:quantbridge@postgres:5432/quantbridge
      QUANT_ENABLE_PARQUET: "true"
      QUANT_DATA_LAKE_DIR: /app/data_lake
      QUANT_GOOGLE_KEY_PATH: /app/key.json
      QUANT_SPREADSHEET_ID: 1kn0Kp1QESSdwvmphCmaUFHNRh9qVUoN-2m_vMVDYHes
      QUANT_SPREADSHEET_NAME: Jino_Quant_Database
    volumes:
      - ./key.json:/app/key.json:ro
      - ./data_lake:/app/data_lake
    command: ["python", "tools/run_research_quality.py"]

volumes:
  quantbridge_pg:
    external: true
    name: quantproject_quantbridge_pg
  quantbridge_api:
    name: quantbridge-fullstack_quantbridge_api
